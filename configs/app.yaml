camera:
  width: 640
  height: 360
  fps: 200

yolo:
  enabled: true
  model_path: "weights/best_v3.pt"
  class_name: "tennis ball"
  confidence: 0.35
  imgsz: 640
  device: 0
  periodic_interval_ms: 300
  request_when_confidence_below: 3

hsv:
  # Typical tennis-ball yellow-green. Calibrate in your real light.
  lower: [35, 70, 70]
  upper: [50, 255, 255]
  erode_iterations: 1
  dilate_iterations: 2
  close_iterations: 1
  min_area: 40
  max_area: 20000
  min_circularity: 0.45
  min_mask_fill_ratio: 0.18
  max_aspect_ratio: 1.8

roi:
  enabled: true
  base_margin_px: 60
  velocity_margin_scale: 1.5
  min_size_px: 96
  max_size_px: 360

filter:
  alpha: 0.75
  beta: 0.20
  max_missing_frames: 12
  prediction_latency_ms: 80

display:
  enabled: true
  window_name: "tennis-ball-tracker"

control:
  enabled: true
  deadband_px: 20
  max_command: 1.0

# 单目3D几何 — 相机安装位姿 + 标定
geometry:
  calibration_path: "configs/calibration.npz"
  ball_diameter_m: 0.093      # 补偿标定尺度误差 (真实球径0.065m)
  camera_height_m: 0.258       # 相机距地面高度 (米)
  camera_pitch_deg: 0.0      # 俯仰角 (度), 正值 = 向下倾斜
  camera_yaw_deg: 0.0         # 偏航角 (度), 0 = 正前方

# 3D轨迹预测
trajectory:
  gravity: -9.81              # 重力加速度 (m/s²), 负值 = 向下
  min_samples_for_fit: 15     # 最少采集点数, 达到后才输出落点预测
  max_history: 30             # 最大历史点数 (丢弃旧数据)
  target_height_m: 0.0        # 目标接球高度 (0 = 地面)
  process_noise_pos: 0.01
  process_noise_vel: 0.5
  measurement_noise: 0.05
  min_prediction_confidence: 0.3  # 置信度低于此值不输出落点

# ESP32 下位板 UART 通信
uart:
  enabled: true                # 已连接 ESP32
  port: "/dev/ttyCH341USB0"    # ESP32 CH340 USB-UART
  baudrate: 115200             # 与 ESP32 固件一致
  timeout_s: 0.05

