camera:
  width: 640
  height: 360
  fps: 120
  fourcc: "MJPG"
  buffer_size: 1

yolo:
  enabled: true
  model_path: "weights/best_v3.pt"
  class_name: "tennis ball"
  confidence: 0.35
  imgsz: 640
  device: 0
  periodic_interval_ms: 300
  request_when_confidence_below: 3

hsv:
  # Typical tennis-ball yellow-green. Calibrate in your real light.
  lower: [30, 40, 80]
  upper: [60, 255, 255]
  erode_iterations: 0
  dilate_iterations: 1
  close_iterations: 1
  min_area: 35
  max_area: 8000
  min_circularity: 0.36
  min_mask_fill_ratio: 0.12
  max_mask_fill_ratio: 0.94
  min_circle_fill_ratio: 0.50
  min_radius_px: 3
  max_radius_px: 70
  max_aspect_ratio: 2.3
  reject_border_touch: true
  border_margin_px: 1

roi:
  enabled: true
  base_margin_px: 90
  velocity_margin_scale: 3.0
  min_size_px: 128
  max_size_px: 640

filter:
  alpha: 0.85
  beta: 0.30
  max_missing_frames: 12
  prediction_latency_ms: 80

display:
  enabled: true
  window_name: "tennis-ball-tracker"
  trail_length: 60
  show_fps: true

control:
  enabled: true
  deadband_px: 20
  max_command: 1.0

# 单目3D几何 — 相机安装位姿 + 标定
geometry:
  calibration_path: "configs/calibration.npz"
  ball_diameter_m: 0.093      # 补偿标定尺度误差 (真实球径0.065m)
  camera_height_m: 0.08       # 兼容旧字段; 当前与 camera_offset_z_m 保持一致
  camera_offset_x_m: -0.08     # 相机光心相对机器人原点 X 偏移: 前方为正
  camera_offset_y_m: 0.10      # 相机光心相对机器人原点 Y 偏移: 左方为正
  camera_offset_z_m: 0.08      # 相机光心相对机器人原点 Z 偏移: 上方为正
  camera_pitch_deg: 0.0      # 俯仰角 (度), 正值 = 向下倾斜
  camera_yaw_deg: 0.0         # 偏航角 (度), 0 = 正前方

# 3D轨迹预测
trajectory:
  gravity: -9.81              # 重力加速度 (m/s²), 负值 = 向下
  min_samples_for_fit: 15     # 最少采集点数, 达到后才输出落点预测
  max_history: 30             # 最大历史点数 (丢弃旧数据)
  target_height_m: 0.0        # 目标接球高度 (0 = 地面)
  process_noise_pos: 0.01
  process_noise_vel: 0.5
  measurement_noise: 0.05
  min_prediction_confidence: 0.3  # 置信度低于此值不输出落点

# ESP32 下位板 UART 通信
uart:
  enabled: true                # 已连接 ESP32
  port: "/dev/ttyCH341USB0"    # ESP32 CH340 USB-UART
  baudrate: 115200             # 与 ESP32 固件一致
  timeout_s: 0.05
